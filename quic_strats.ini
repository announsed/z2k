args=--payload=quic_initial --out-range=-d100 --lua-desync=z2k_quic_morph_v2:payload=quic_initial:dir=out:packets=2:noise=2:pad_min=12:pad_max=72

[rkn_quic_morph_v2]
desc=RKN QUIC morph v2 profile-2 (aggressive 3-frag overlap/deorder)
args=--payload=quic_initial --out-range=-d100 --lua-desync=z2k_quic_morph_v2:payload=quic_initial:dir=out:packets=2:profile=2:noise=2:pad_min=8:pad_max=64:ipfrag_pos_udp=16:ipfrag_pos2=56:ipfrag_overlap12=16:ipfrag_overlap23=8
