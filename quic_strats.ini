[yt_quic_frag3_overlap]
desc=YouTube QUIC 3-fragment overlap (custom z2k_ipfrag3_tiny + disorder + fake)
args=--payload=quic_initial --out-range=-d100 --lua-desync=fake:blob=quic5:repeats=4:ip_autottl=-2,3-20 --lua-desync=send:payload=quic_initial:dir=out:ipfrag=z2k_ipfrag3_tiny:ipfrag_pos_udp=8:ipfrag_pos2=32:ipfrag_overlap12=8:ipfrag_overlap23=8:ipfrag_disorder:ipfrag_next2=255 --lua-desync=drop

[rutracker_quic_frag3_overlap]
desc=RuTracker QUIC 3-fragment overlap (custom z2k_ipfrag3 + fake)
args=--payload=quic_initial --out-range=-d100 --lua-desync=fake:blob=quic_rutracker:repeats=6 --lua-desync=send:payload=quic_initial:dir=out:ipfrag=z2k_ipfrag3:ipfrag_pos_udp=16:ipfrag_pos2=48:ipfrag_overlap12=8:ipfrag_overlap23=8:ipfrag_disorder:ipfrag_next2=255 --lua-desync=drop

[yt_quic_timing_frag3]
